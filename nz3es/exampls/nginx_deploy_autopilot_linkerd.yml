apiVersion: v1
kind: Namespace
metadata:
  name: nginx-autopilot-linkerd
  annotations:
    linkerd.io/inject: enabled
    config.alpha.linkerd.io/proxy-enable-native-sidecar: "true"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-autopilot
  namespace: nginx-autopilot-linkerd
spec:
  selector:
    matchLabels:
      app: nginx-autopilot
  replicas: 1
  template:
    metadata:
      labels:
        app: nginx-autopilot
      annotations:
        # Linkerd proxy sidecar resource tuning
        # On autopilot nodes, proxy resources are summed with app resources for billing
        config.linkerd.io/proxy-cpu-request: "10m"
        config.linkerd.io/proxy-memory-request: "32Mi"
        config.linkerd.io/proxy-cpu-limit: "100m"
        config.linkerd.io/proxy-memory-limit: "250Mi"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx-autopilot
          image: nginx:1.14.2
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "100m"
              memory: "128Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
      volumes:
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
      nodeSelector: # This is not required if the label has added to namespace level
        cloud.google.com/compute-class: "autopilot"
